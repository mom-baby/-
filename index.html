<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เซอร์ไพรส์แม่ย้อย</title>
    
    <!-- เรียกใช้ SweetAlert2 สำหรับหน้าต่างแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- เรียกใช้ Canvas Confetti สำหรับเอฟเฟคพลุกระดาษ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        /* ปุ่มกดแบบมีแสงกระพริบ */
        .magic-button {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: 700;
            color: white;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(45deg, #ff00cc, #333399);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulse 1.5s infinite;
        }

        .magic-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 204, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 0, 204, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 204, 0); }
        }

        /* พื้นหลังตอนรูปเด้งขึ้นมา */
        .modal-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px); /* เบลอฉากหลังเพิ่มความขลัง */
        }

        /* เอฟเฟครูปหมุนพร้อมเรืองแสง */
        .popup-image {
            max-width: 80%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 0 60px 20px rgba(255, 215, 0, 0.8); /* แสงสีทอง */
            animation: grandEntrance 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes grandEntrance {
            0% {
                transform: scale(0) rotate(-1080deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.1) rotate(10deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ปุ่มปิด */
        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 50px;
            color: white;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
        }
        .close-btn:hover {
            color: #ff4444;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <!-- ปุ่มเริ่มความอลังการ -->
    <button class="magic-button" onclick="triggerMagic()">กดตรงนี้เลยแม่ย้อย!</button>

    <!-- ส่วนที่ซ่อนรูปภาพไว้ -->
    <div class="modal-container" id="imageModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img src="https://img1.pic.in.th/images/imagee64073b138a7c4b2.png" alt="Surprise Image" class="popup-image">
    </div>

    <script>
        function triggerMagic() {
            // 1. แสดงกล่องแจ้งเตือนแบบเล่นใหญ่
            Swal.fire({
                title: 'ขอบคุณที่กดนะแม่ย้อย!',
                width: 600,
                padding: '3em',
                color: '#fff',
                background: '#1e3c72',
                backdrop: `
                    rgba(0,0,123,0.6)
                    url("https://sweetalert2.github.io/images/nyan-cat.gif")
                    left top
                    no-repeat
                `,
                confirmButtonText: 'เปิดดูความอลังการ',
                confirmButtonColor: '#ff00cc'
            }).then((result) => {
                if (result.isConfirmed) {
                    showImageWithEffects();
                }
            });
        }

        function showImageWithEffects() {
            // แสดงหน้าต่างรูปภาพ
            document.getElementById('imageModal').style.display = 'flex';

            // จุดพลุกระดาษรัวๆ 3 วินาที
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 10,
                    angle: 60,
                    spread: 80,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffffff']
                });
                confetti({
                    particleCount: 10,
                    angle: 120,
                    spread: 80,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
    </script>
</body>
</html>
